            color: #999999;
            text-transform: uppercase;
        }
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .filter-link {
            font-size: 12px;
            font-weight: 500;
            color: #888888;
            text-decoration: none;
            transition: all 0.3s ease;
            padding: 4px 16px;
        }
        .filter-link:hover {
            color: #000000;
        }
        .filter-link.active {
            color: #000000;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            font-weight: 600;
        }
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .gallery-img {
            width: 100%;
            height: auto;
            object-fit: cover;
            aspect-ratio: 4 / 3;
            transition: transform 0.3s ease, filter 0.3s ease;
            border-radius: 2px;
        }
        .gallery-img:hover {
            transform: scale(1.02);
            filter: brightness(92%);
        }
        footer {
            text-align: center;
            padding: 60px 20px;
            margin-top: 60px;
            border-top: 1px solid #f5f5f5;
        }
        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 22px;
            color: #111111;
            margin-bottom: 5px;
        }
        .footer-copyright {
            font-size: 11px;
            color: #999999;
            margin-bottom: 20px;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social-icons a {
            color: #999999;
            font-size: 18px;
            transition: color 0.3s ease;
        }
        .social-icons a:hover {
            color: #111111;
        }
        .camera-frame {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 5px solid #111111;
            z-index: 9999;
            pointer-events: none;
        }
        .frame-top-left {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }
        .frame-top-right {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }
        .frame-bottom-left {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
        }
        .frame-bottom-right {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }
    </style>
